proxies: []
proxy-groups:
  - name: SELECT
    type: select
    proxies:
      - DIRECT
  - name: URL-TEST
    type: url-test
    url: http://www.google.com/generate_204
    interval: 300
    proxies:
      - DIRECT
  - name: FALLBACK
    type: fallback
    url: http://www.google.com/generate_204
    interval: 300
    proxies:
      - DIRECT
rules:
  - MATCH,SELECT
