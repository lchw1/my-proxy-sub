proxies:
  - name: Ваше приложение не поддерживается.
    type: vless
    server: 0.0.0.0
    port: 1
    uuid: 00000000-0000-0000-0000-000000000000
    udp: true
    network: tcp
proxy-groups:
  - name: 🚀 Главный Выбор
    type: select
    proxies:
      - 🤖 Авто-режимы
      - 🌐 Все серверы (Ручной)
      - 🌍 Зарубеж (Ручной)
      - 🐻 Россия (Ручной)
      - DIRECT
  - name: 🤖 Авто-режимы
    type: select
    proxies:
      - ⚡ Лучший пинг (Все)
      - ⚡ Авто-Зарубеж
      - ⚡ Авто-Россия
  - name: 🌐 Все серверы (Ручной)
    type: select
    proxies:
      - Ваше приложение не поддерживается.
  - name: 🌍 Зарубеж (Ручной)
    type: select
    proxies:
      - Ваше приложение не поддерживается.
  - name: 🐻 Россия (Ручной)
    type: select
    proxies:
      - DIRECT
  - name: ⚡ Лучший пинг (Все)
    type: url-test
    hidden: true
    url: http://www.gstatic.com/generate_204
    interval: 150
    proxies:
      - Ваше приложение не поддерживается.
  - name: ⚡ Авто-Зарубеж
    type: url-test
    hidden: true
    url: http://www.gstatic.com/generate_204
    interval: 150
    proxies:
      - Ваше приложение не поддерживается.
  - name: ⚡ Авто-Россия
    type: url-test
    hidden: true
    url: http://www.gstatic.com/generate_204
    interval: 150
    proxies:
      - DIRECT
rules:
  - MATCH,🚀 Главный Выбор
