sources:
  - url: "https://raw.githubusercontent.com/ebrasha/free-v2ray-public-list/main/all_extracted_configs.txt"
    type: "base64"
    timeout: 15
  - url: "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/BLACK_VLESS_RUS.txt"
    type: "base64"
    timeout: 15
  - url: "https://raw.githubusercontent.com/barry-far/V2ray-Config/main/Splitted-By-Protocol/vless.txt"
    type: "base64"
    timeout: 15

processing:
  chunk_size: 500
  max_candidates: 5000
  concurrent_checks: 3
  check_timeout: 3
  retry_count: 2

filtering:
  skip_localhost: true
  skip_private_ips: true
  min_port: 1
  max_port: 65535

logging:
  level: "INFO"
  file: "collector.log"
  console: true

output:
  v2ray:
    file: "output/v2ray_proxies.json"
    enabled: true
    max_proxies: 500
  mihomo:
    file: "output/mihomo_proxies.yaml"
    enabled: true
    max_proxies: 500
