proxy-groups:
  - name: 🚀 Главный Выбор
    type: select
    proxies:
      - 🤖 Авто-режимы
      - 🌐 Все серверы (Ручной)
      - 🌍 Зарубеж (Ручной)
      - 🐻 Россия (Ручной)
      - DIRECT
  - name: 🤖 Авто-режимы
    type: select
    proxies:
      - ⚡ Лучший пинг (Все)
      - ⚡ Авто-Зарубеж
      - ⚡ Авто-Россия
  - name: 🌐 Все серверы (Ручной)
    type: select
    proxies:
      - 🇮🇹 Италия
      - 🇳🇱 Нидерланды
      - 🇩🇪 Германия
      - 🇫🇮 Финляндия
      - 🇸🇬 Сингапур
      - 🇺🇸 США
  - name: 🌍 Зарубеж (Ручной)
    type: select
    proxies:
      - 🇮🇹 Италия
      - 🇳🇱 Нидерланды
      - 🇩🇪 Германия
      - 🇫🇮 Финляндия
      - 🇸🇬 Сингапур
      - 🇺🇸 США
  - name: 🐻 Россия (Ручной)
    type: select
    proxies:
      - DIRECT
  - name: ⚡ Лучший пинг (Все)
    type: url-test
    hidden: true
    url: http://cp.cloudflare.com/generate_204
    interval: 150
    proxies:
      - 🇮🇹 Италия
      - 🇳🇱 Нидерланды
      - 🇩🇪 Германия
      - 🇫🇮 Финляндия
      - 🇸🇬 Сингапур
      - 🇺🇸 США
  - name: ⚡ Авто-Зарубеж
    type: url-test
    hidden: true
    url: http://cp.cloudflare.com/generate_204
    interval: 150
    proxies:
      - 🇮🇹 Италия
      - 🇳🇱 Нидерланды
      - 🇩🇪 Германия
      - 🇫🇮 Финляндия
      - 🇸🇬 Сингапур
      - 🇺🇸 США
  - name: ⚡ Авто-Россия
    type: url-test
    hidden: true
    url: http://cp.cloudflare.com/generate_204
    interval: 150
    proxies:
      - DIRECT
