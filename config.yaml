proxies:
  - name: 🏳️ Неизвестно
    type: vless
    server: srv169.towersflowerss.com
    port: 443
    uuid: b43a13be-150c-4a6a-8501-b71c1b6476fb
    udp: true
    network: ws
    ws-opts:
      path: /
      headers:
        Host: srv169.towersflowerss.com
proxy-groups:
