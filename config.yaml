proxies: []
proxy-groups:
  - name: SELECT
    type: select
    proxies:
      - URL-TEST
      - FALLBACK
  - name: URL-TEST
    type: url-test
    url: http://www.google.com/generate_204
    interval: 300
    proxies: &id001 []
  - name: FALLBACK
    type: fallback
    url: http://www.google.com/generate_204
    interval: 300
    proxies: *id001
