name: Update Proxy Nodes

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install aiohttp

      - name: Download xray-knife
        run: |
          wget -q https://github.com/lilendian0x00/xray-knife/releases/latest/download/Xray-knife-linux-64.zip -O knife.zip
          unzip -q -o knife.zip
          chmod +x xray-knife
          rm -f knife.zip

      - name: Collect nodes
        run: python -u main.py

      - name: Test nodes in chunks
        run: python -u test_nodes.py

      - name: Build outputs
        run: python -u build.py

      - name: Show results
        run: |
          RAW=$(wc -l < raw.txt 2>/dev/null || echo 0)
          ALIVE=$(wc -l < tested.txt 2>/dev/null || echo 0)
          echo "Собрано: $RAW | Рабочих: $ALIVE"

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sub.txt clash.yaml raw.txt tested.txt || true
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Update nodes $(date -u '+%Y-%m-%d %H:%M')"
            git push
          fi
