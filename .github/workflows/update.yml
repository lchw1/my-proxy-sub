name: Update Proxy Nodes

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # ← ДОБАВИТЬ: максимум 10 минут вместо бесконечности
    env:
      GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests aiohttp

      - name: Run script
        run: timeout 480 python main.py  # ← ДОБАВИТЬ: таймаут 8 минут для скрипта

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sub.txt clash.yaml sources.json
          git commit -m "Update nodes" || echo "No changes to commit"
          git push
