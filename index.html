<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VPN Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-void: #07080f;
    --bg-deep: #0d0f1a;
    --bg-surface: #111420;
    --glass-bg: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.08);
    --glass-hover: rgba(255,255,255,0.07);
    --accent-blue: #3d7fff;
    --accent-violet: #8b5cf6;
    --accent-cyan: #22d3ee;
    --accent-glow-blue: rgba(61,127,255,0.35);
    --accent-glow-violet: rgba(139,92,246,0.3);
    --text-primary: #f0f2ff;
    --text-secondary: rgba(200,208,255,0.55);
    --text-muted: rgba(180,190,255,0.3);
    --radius-card: 22px;
    --radius-pill: 50px;
    --transition: cubic-bezier(0.23,1,0.32,1);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg-void);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    line-height: 1.5;
  }

  /* ─── BACKGROUND AURORA ─────────────────────────────── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 15% 10%, rgba(61,127,255,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 85% 80%, rgba(139,92,246,0.1) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 50% 50%, rgba(34,211,238,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* subtle grid texture */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ─── LAYOUT ─────────────────────────────────────────── */
  .page {
    position: relative;
    z-index: 1;
    max-width: 1080px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }

  /* ─── HEADER ─────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 3rem;
    animation: fadeDown 0.7s var(--transition) both;
  }

  .header-icon {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-violet));
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 0 24px var(--accent-glow-blue), 0 0 8px rgba(0,0,0,0.5);
  }

  .header-icon svg { width: 26px; height: 26px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .header-text h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.4rem, 4vw, 1.85rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    background: linear-gradient(100deg, #fff 30%, var(--accent-cyan) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
  }

  .header-text p {
    font-size: 0.82rem;
    color: var(--text-secondary);
    margin-top: 3px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-weight: 500;
  }

  .header-badge {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 7px;
    background: rgba(34,211,238,0.08);
    border: 1px solid rgba(34,211,238,0.2);
    border-radius: var(--radius-pill);
    padding: 6px 14px 6px 10px;
    font-size: 0.78rem;
    color: var(--accent-cyan);
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  .pulse-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent-cyan);
    box-shadow: 0 0 6px var(--accent-cyan);
    animation: pulse 2s infinite;
  }

  /* ─── GLASS CARD ─────────────────────────────────────── */
  .card {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-card);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    transition: transform 0.4s var(--transition), box-shadow 0.4s var(--transition), border-color 0.4s var(--transition);
  }

  .card:hover {
    transform: translateY(-4px);
    border-color: rgba(255,255,255,0.14);
    box-shadow: 0 24px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.06);
  }

  /* ─── HERO CARD (total) ──────────────────────────────── */
  .hero-card {
    padding: 2.5rem 2.8rem;
    margin-bottom: 1.5rem;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.7s var(--transition) 0.1s both;
  }

  .hero-card::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 260px; height: 260px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(61,127,255,0.18) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-card::after {
    content: '';
    position: absolute;
    bottom: -40px; left: 30%;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(139,92,246,0.13) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-card:hover {
    box-shadow:
      0 24px 60px rgba(0,0,0,0.4),
      0 0 40px var(--accent-glow-blue),
      0 0 0 1px rgba(61,127,255,0.15);
  }

  .hero-label {
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 0.9rem;
  }

  .hero-label::before {
    content: '';
    display: inline-block;
    width: 18px; height: 2px;
    background: linear-gradient(90deg, var(--accent-blue), var(--accent-violet));
    border-radius: 2px;
  }

  .hero-number {
    font-family: 'Syne', sans-serif;
    font-size: clamp(4rem, 10vw, 7rem);
    font-weight: 800;
    line-height: 0.9;
    letter-spacing: -0.04em;
    background: linear-gradient(135deg, #fff 20%, var(--accent-blue) 55%, var(--accent-violet) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 30px var(--accent-glow-blue));
  }

  .hero-sub {
    margin-top: 1rem;
    font-size: 0.88rem;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .hero-sub span { color: #4ade80; font-weight: 600; }

  .hero-decoration {
    position: absolute;
    right: 2.5rem;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.06;
  }

  .hero-decoration svg { width: 140px; height: 140px; fill: white; }

  /* ─── GRID ───────────────────────────────────────────── */
  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
  }

  @media (max-width: 680px) {
    .grid-2 { grid-template-columns: 1fr; }
    .hero-decoration { display: none; }
    .hero-card { padding: 2rem 1.8rem; }
    .header-badge { display: none; }
  }

  /* ─── CHART CARD ─────────────────────────────────────── */
  .chart-card {
    padding: 2rem;
    animation: fadeUp 0.7s var(--transition) 0.2s both;
  }

  .chart-card:hover {
    box-shadow:
      0 24px 60px rgba(0,0,0,0.4),
      0 0 30px var(--accent-glow-violet),
      0 0 0 1px rgba(139,92,246,0.12);
  }

  .card-title {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-secondary);
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent-violet);
    box-shadow: 0 0 8px var(--accent-violet);
  }

  .chart-wrap {
    position: relative;
    height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .chart-center-label {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
  }

  .chart-center-label .cl-num {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    color: var(--text-primary);
    line-height: 1;
  }

  .chart-center-label .cl-text {
    font-size: 0.68rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 3px;
  }

  /* ─── COUNTRY LIST CARD ──────────────────────────────── */
  .list-card {
    padding: 2rem;
    animation: fadeUp 0.7s var(--transition) 0.3s both;
    display: flex;
    flex-direction: column;
  }

  .list-card:hover {
    box-shadow:
      0 24px 60px rgba(0,0,0,0.4),
      0 0 30px rgba(34,211,238,0.1),
      0 0 0 1px rgba(34,211,238,0.08);
  }

  .country-list {
    flex: 1;
    overflow-y: auto;
    max-height: 280px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-right: 4px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
  }

  .country-list::-webkit-scrollbar { width: 4px; }
  .country-list::-webkit-scrollbar-track { background: transparent; }
  .country-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

  .country-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 0.85rem 1.1rem;
    cursor: default;
    transition: background 0.3s var(--transition), border-color 0.3s var(--transition), transform 0.3s var(--transition);
  }

  .country-item:hover {
    background: rgba(255,255,255,0.07);
    border-color: rgba(255,255,255,0.12);
    transform: translateX(4px);
  }

  .country-flag {
    font-size: 1.5rem;
    line-height: 1;
    flex-shrink: 0;
  }

  .country-info { flex: 1; min-width: 0; }

  .country-name {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .country-bar-wrap {
    height: 3px;
    background: rgba(255,255,255,0.07);
    border-radius: 3px;
    margin-top: 5px;
    overflow: hidden;
  }

  .country-bar {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan));
    transition: width 1.2s var(--transition);
  }

  .country-badge {
    flex-shrink: 0;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--text-primary);
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 3px 12px;
    min-width: 44px;
    text-align: center;
  }

  /* ─── FOOTER ─────────────────────────────────────────── */
  .page-footer {
    margin-top: 2.5rem;
    text-align: center;
    font-size: 0.75rem;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    animation: fadeUp 0.7s var(--transition) 0.4s both;
  }

  /* ─── LOADING ─────────────────────────────────────────── */
  .skeleton {
    background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 8px;
  }

  /* ─── ANIMATIONS ─────────────────────────────────────── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.5; transform: scale(0.85); }
  }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  @keyframes numberUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── ERROR ──────────────────────────────────────────── */
  .error-msg {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 14px;
    padding: 1.2rem 1.5rem;
    color: #fca5a5;
    font-size: 0.85rem;
    text-align: center;
    margin-top: 1rem;
  }
</style>
</head>
<body>
<div class="page">

  <!-- ── HEADER ── -->
  <header>
    <div class="header-icon">
      <svg viewBox="0 0 24 24">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>VPN Monitor</h1>
      <p>Панель управления серверами</p>
    </div>
    <div class="header-badge">
      <span class="pulse-dot"></span>
      Live
    </div>
  </header>

  <!-- ── HERO CARD ── -->
  <div class="card hero-card">
    <div class="hero-label">Всего рабочих VLESS серверов</div>
    <div class="hero-number" id="totalNum">—</div>
    <div class="hero-sub">
      <span id="heroStatus">↑ Загрузка данных...</span>
    </div>
    <div class="hero-decoration">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
    </div>
  </div>

  <!-- ── GRID ── -->
  <div class="grid-2">

    <!-- Chart card -->
    <div class="card chart-card">
      <div class="card-title">
        <span class="card-title-dot"></span>
        Распределение по странам
      </div>
      <div class="chart-wrap">
        <canvas id="donutChart"></canvas>
        <div class="chart-center-label">
          <div class="cl-num" id="chartCenterNum">—</div>
          <div class="cl-text">серверов</div>
        </div>
      </div>
    </div>

    <!-- Countries list card -->
    <div class="card list-card">
      <div class="card-title">
        <span class="card-title-dot" style="background:var(--accent-cyan);box-shadow:0 0 8px var(--accent-cyan)"></span>
        Статистика по регионам
      </div>
      <div class="country-list" id="countryList">
        <!-- injected by JS -->
      </div>
    </div>

  </div>

  <div class="page-footer" id="pageFooter">Данные обновлены только что · VPN Monitor v2.0</div>

</div><!-- /page -->

<script>
(function () {

  /* ── palette for chart ─────────────────────────────── */
  const COLORS = [
    { bg: 'rgba(61,127,255,0.85)',  border: '#3d7fff' },
    { bg: 'rgba(139,92,246,0.85)', border: '#8b5cf6' },
    { bg: 'rgba(34,211,238,0.85)', border: '#22d3ee' },
    { bg: 'rgba(251,191,36,0.85)', border: '#fbbf24' },
    { bg: 'rgba(248,113,113,0.85)',border: '#f87171' },
    { bg: 'rgba(52,211,153,0.85)', border: '#34d399' },
    { bg: 'rgba(249,115,22,0.85)', border: '#f97316' },
  ];

  /* ── animate count-up ──────────────────────────────── */
  function animateCounter(el, target, duration = 1600) {
    const start = performance.now();
    const from = 0;
    function step(now) {
      const progress = Math.min((now - start) / duration, 1);
      const ease = 1 - Math.pow(1 - progress, 4); // easeOutQuart
      el.textContent = Math.round(from + (target - from) * ease);
      if (progress < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  /* ── build chart ───────────────────────────────────── */
  function buildChart(labels, values, total) {
    const ctx = document.getElementById('donutChart').getContext('2d');
    const bgColors  = values.map((_, i) => COLORS[i % COLORS.length].bg);
    const brdColors = values.map((_, i) => COLORS[i % COLORS.length].border);

    new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels,
        datasets: [{
          data: values,
          backgroundColor: bgColors,
          borderColor: brdColors,
          borderWidth: 2,
          hoverBorderWidth: 3,
          hoverOffset: 10,
          borderRadius: 6,
          spacing: 4,
        }]
      },
      options: {
        cutout: '72%',
        responsive: true,
        maintainAspectRatio: false,
        animation: { animateRotate: true, duration: 1200, easing: 'easeOutQuart' },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: 'rgba(13,15,26,0.92)',
            borderColor: 'rgba(255,255,255,0.12)',
            borderWidth: 1,
            titleColor: '#f0f2ff',
            bodyColor: 'rgba(200,208,255,0.7)',
            titleFont: { family: 'Space Grotesk', weight: '600', size: 13 },
            bodyFont:  { family: 'Space Grotesk', size: 12 },
            padding: 12,
            cornerRadius: 12,
            displayColors: true,
            boxWidth: 10,
            boxHeight: 10,
            callbacks: {
              label(ctx) {
                const pct = ((ctx.parsed / total) * 100).toFixed(1);
                return ` ${ctx.parsed} серверов (${pct}%)`;
              }
            }
          }
        }
      }
    });

    const cNum = document.getElementById('chartCenterNum');
    animateCounter(cNum, total, 1400);
  }

  /* ── build country list ────────────────────────────── */
  function buildList(countries, total) {
    const list = document.getElementById('countryList');
    list.innerHTML = '';
    const entries = Object.entries(countries)
      .sort((a, b) => b[1] - a[1]);

    const max = entries[0]?.[1] || 1;

    entries.forEach(([name, count], i) => {
      const pct = Math.round((count / max) * 100);
      const colorIdx = i % COLORS.length;
      const barColor = COLORS[colorIdx].border;

      /* split emoji flag + name */
      const flagMatch = name.match(/^(\p{Emoji_Presentation}+|\p{Emoji}\uFE0F|\S+\s)/u);
      const flag = flagMatch ? flagMatch[0].trim() : '🌍';
      const label = name.replace(flag, '').trim();

      const item = document.createElement('div');
      item.className = 'country-item';
      item.style.animationDelay = `${0.05 * i}s`;
      item.innerHTML = `
        <span class="country-flag">${flag}</span>
        <div class="country-info">
          <div class="country-name">${label}</div>
          <div class="country-bar-wrap">
            <div class="country-bar" style="width:0%;background:linear-gradient(90deg,${barColor},var(--accent-cyan))" data-pct="${pct}"></div>
          </div>
        </div>
        <div class="country-badge">${count}</div>
      `;
      list.appendChild(item);

      /* animate bar after paint */
      setTimeout(() => {
        item.querySelector('.country-bar').style.width = pct + '%';
      }, 200 + i * 80);
    });
  }

  /* ── render data ────────────────────────────────────── */
  function render(data) {
    const { total, countries } = data;
    const labels = Object.keys(countries);
    const values = Object.values(countries);

    /* hero */
    const numEl = document.getElementById('totalNum');
    numEl.style.animation = 'numberUp 0.5s ease both';
    animateCounter(numEl, total, 1800);

    document.getElementById('heroStatus').innerHTML =
      `<span>✦ Все серверы в сети</span>`;

    buildChart(labels, values, total);
    buildList(countries, total);

    const now = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('pageFooter').textContent =
      `Данные обновлены в ${now} · VPN Monitor v2.0`;
  }

  /* ── mock fallback (if stats.json absent) ────────────── */
  function useMock() {
    return {
      total: 142,
      countries: {
        '🇷🇺 Россия':     45,
        '🇩🇪 Германия':   30,
        '🇳🇱 Нидерланды': 20,
        '🇫🇮 Финляндия':  17,
        '🇺🇸 США':        14,
        '🇸🇬 Сингапур':   10,
        '🇯🇵 Япония':      6,
      }
    };
  }

  /* ── fetch ───────────────────────────────────────────── */
  async function init() {
    try {
      const res = await fetch('stats.json');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      render(data);
    } catch (err) {
      /* fallback to mock so the dashboard always looks great */
      console.warn('stats.json not found, using demo data:', err.message);
      render(useMock());
    }
  }

  init();
})();
</script>
</body>
</html>
