<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN Network Status</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.05);
            --accent-glow: rgba(56, 189, 248, 0.4);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --gradient-start: #38bdf8;
            --gradient-end: #818cf8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(129, 140, 248, 0.08), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 16px;
        }

        .glass-panel {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 30px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-panel:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px var(--accent-glow);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hero-stats {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }

        .hero-stats::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            opacity: 0.1;
            z-index: -1;
        }

        .total-label {
            font-size: 16px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .total-value {
            font-size: 72px;
            font-weight: 800;
            line-height: 1;
            margin: 10px 0;
            text-shadow: 0 0 20px var(--accent-glow);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media (min-width: 768px) {
            .grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .chart-container {
            position: relative;
            height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .list-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 350px;
            overflow-y: auto;
            padding-right: 10px;
        }

        /* Красивый скроллбар */
        .list-container::-webkit-scrollbar { width: 6px; }
        .list-container::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); border-radius: 10px; }
        .list-container::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        .list-container::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

        .country-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 16px 20px;
            border-radius: 16px;
            transition: all 0.2s ease;
        }

        .country-row:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(56, 189, 248, 0.3);
            transform: translateX(5px);
        }

        .country-name {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .country-count {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: #fff;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 800;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }

        h2 {
            font-size: 20px;
            margin-bottom: 20px;
            font-weight: 600;
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>VLESS NETWORK</h1>
            <p class="subtitle">Live Proxy Nodes Status</p>
        </header>

        <div class="glass-panel hero-stats">
            <div class="total-label">Active Nodes</div>
            <div class="total-value" id="totalCount">0</div>
        </div>

        <div class="grid">
            <div class="glass-panel">
                <h2>Distribution</h2>
                <div class="chart-container">
                    <canvas id="myChart"></canvas>
                </div>
            </div>

            <div class="glass-panel">
                <h2>Locations</h2>
                <div class="list-container" id="countryList">
                    </div>
            </div>
        </div>
    </div>

    <script>
        const chartColors = [
            '#38bdf8', '#818cf8', '#34d399', '#f472b6', 
            '#fbbf24', '#a78bfa', '#2dd4bf', '#fb923c'
        ];

        // Анимация счетчика чисел
        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start);
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        async function loadStats() {
            try {
                const response = await fetch('stats.json');
                const data = await response.json();

                // Анимируем главное число (за 1.5 секунды)
                const totalEl = document.getElementById('totalCount');
                animateValue(totalEl, 0, data.total, 1500);

                const listContainer = document.getElementById('countryList');
                const labels = [];
                const chartData = [];

                for (const [country, count] of Object.entries(data.countries)) {
                    labels.push(country);
                    chartData.push(count);

                    const div = document.createElement('div');
                    div.className = 'country-row';
                    div.innerHTML = `
                        <span class="country-name">${country}</span>
                        <span class="country-count">${count}</span>
                    `;
                    listContainer.appendChild(div);
                }

                // Рисуем красивый график с темной темой
                const ctx = document.getElementById('myChart').getContext('2d');
                Chart.defaults.color = '#94a3b8';
                Chart.defaults.font.family = "'Poppins', sans-serif";

                new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: chartData,
                            backgroundColor: chartColors,
                            borderWidth: 2,
                            borderColor: '#050505',
                            hoverOffset: 8
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        cutout: '75%',
                        plugins: {
                            legend: { 
                                position: 'right',
                                labels: { boxWidth: 12, padding: 15 }
                            },
                            tooltip: {
                                backgroundColor: 'rgba(0,0,0,0.8)',
                                padding: 12,
                                cornerRadius: 8,
                                displayColors: false
                            }
                        }
                    }
                });

            } catch (error) {
                console.error('Ошибка загрузки статистики:', error);
                document.getElementById('totalCount').innerText = "ERROR";
            }
        }

        loadStats();
    </script>
</body>
</html>
