import requests
import base64
import re
import urllib.parse
import sys

# Настройки
HEADERS = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36'}

# Список источников (скрипт обходит их сам)
SOURCES = [
    "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/BLACK_VLESS_RUS.txt",
    "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/BLACK_VLESS_RUS_mobile.txt",
    "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/Vless-Reality-White-Lists-Rus-Mobile.txt",
    "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt",
    "https://raw.githubusercontent.com/kort0881/vpn-vless-configs-russia/main/githubmirror/clean/vless.txt",
    "https://raw.githubusercontent.com/yebekhe/TelegramV2rayCollector/main/sub/normal/vless"
]

def fetch_data(url):
    try:
        r = requests.get(url, headers=HEADERS, timeout=15)
        if r.status_code != 200: return ""
        text = r.text
        if "vless://" not in text[:500]:
            try:
                text = base64.b64decode(text.strip()).decode('utf-8', errors='ignore')
            except: pass
        return text
    except: return ""

def clean_name(raw, idx):
    try: name = urllib.parse.unquote(raw)
    except: name = raw
    # Оставляем ТОЛЬКО латиницу и цифры — это 100% защита от ошибок YAML
    name = re.sub(r'[^a-zA-Z0-9]', '', name)
    return f"Node{idx}{name[:10]}"

def parse_vless(url, idx):
    try:
        m = re.match(r'vless://([^@]+)@([^:]+):(\d+)\??([^#]*)#?(.*)', url)
        if not m: return None
        uuid, host, port, qs, raw_name = m.groups()
        params = {p.split('=')[0]: urllib.parse.unquote(p.split('=')[1]) for p in qs.split('&') if '=' in p}
        
        return {
            'name': clean_name(raw_name, idx),
            'server': host, 'port': int(port), 'uuid': uuid,
            'tls': params.get('security') in ('tls', 'reality'),
            'sni': params.get('sni', ''), 'net': params.get('type', 'tcp'),
            'path': params.get('path', '/'), 'pbk': params.get('pbk', ''), 'sid': params.get('sid', '')
        }
    except: return None

def main():
    nodes_raw = set()
    print("Собираю ссылки...")
    for url in SOURCES:
        text = fetch_data(url)
        found = re.findall(r'vless://[^\s\r\n]+', text)
        nodes_raw.update(found)

    # Лимит 500 для стабильности FClash
    final_nodes = sorted(list(nodes_raw))[:500]
    
    # 1. sub.txt
    with open('sub.txt', 'w') as f:
        f.write(base64.b64encode('\n'.join(final_nodes).encode()).decode())

    # 2. clash.yaml
    proxies = []
    for i, url in enumerate(final_nodes):
        p = parse_vless(url, i)
        if p: proxies.append(p)

    with open('clash.yaml', 'w', encoding='utf-8') as f:
        # Пишем напрямую f.write, чтобы избежать проблем с отступами в списках Python
        f.write("mixed-port: 7890\nallow-lan: false\nmode: global\nlog-level: info\n")
        f.write("dns:\n  enable: true\n  nameserver:\n    - 8.8.8.8\n    - 1.1.1.1\n")
        f.write("proxies:\n")
        
        for p in proxies:
            f.write(f"  - name: \"{p['name']}\"\n")
            f.write(f"    type: vless\n    server: {p['server']}\n    port: {p['port']}\n")
            f.write(f"    uuid: {p['uuid']}\n    tls: {str(p['tls']).lower()}\n")
            f.write(f"    udp: true\n    skip-cert-verify: true\n")
            if p['sni']: f.write(f"    servername: \"{p['sni']}\"\n")
            if p['net'] == 'ws':
                f.write(f"    network: ws\n    ws-opts:\n      path: \"{p['path']}\"\n")
            if p['pbk']:
                f.write(f"    reality-opts:\n      public-key: {p['pbk']}\n      short-id: \"{p['sid']}\"\n")

        f.write("\nproxy-groups:\n  - name: \"Auto\"\n    type: url-test\n    url: http://www.gstatic.com/generate_204\n    interval: 180\n    proxies:\n")
        for p in proxies:
            f.write(f"      - \"{p['name']}\"\n")
        f.write("rules:\n  - MATCH,Auto\n")

    print(f"Готово! Собрано {len(proxies)} узлов.")

if __name__ == '__main__':
    main()
