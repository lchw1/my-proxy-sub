mixed-port: 7890
allow-lan: false
mode: global
log-level: info
external-controller: 127.0.0.1:9090

dns:
  enable: true
  nameserver:
    - 8.8.8.8
    - 1.1.1.1

proxies:

proxy-groups:
  - name: "Auto"
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 180
    tolerance: 50
    proxies:

  - name: "PROXY"
    type: select
    proxies:
      - "Auto"

rules:
  - MATCH,Auto